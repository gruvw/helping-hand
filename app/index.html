<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Helping Hand</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        padding: 2rem;
        max-width: 400px;
        margin: 0 auto;
      }

      .form-group {
        margin-bottom: 1rem;
      }

      label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: bold;
      }

      input[type="number"] {
        width: 100%;
        padding: 8px;
        font-size: 16px;
        box-sizing: border-box;
      }

      button {
        padding: 10px 15px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
        width: 100%;
      }

      button:hover {
        background-color: #0056b3;
      }

      #status {
        margin-top: 1rem;
        font-size: 14px;
        color: #555;
      }
    </style>
  </head>
  <body>

    <h2>Set Angle</h2>

    <form id="angleForm">
      <div class="form-group">
        <label for="angleInput">Angle (°):</label>
        <input type="number" id="angleInput" name="angle" value="120" required>
      </div>
      <button type="submit">Send Command</button>
    </form>

    <div id="status"></div>

    <script>
      const form = document.getElementById("angleForm");
      const statusDiv = document.getElementById("status");

      form.addEventListener("submit", function(event) {
        event.preventDefault();

        const angleValue = document.getElementById("angleInput").value;
        const targetUrl = `http://hh-0001.local/click?angle=${encodeURIComponent(angleValue)}`;

        statusDiv.textContent = "Sending request...";
        statusDiv.style.color = "black";

        fetch(targetUrl, {
            method: "GET",
            mode: 'no-cors'
        })
        .then(response => {
            statusDiv.textContent = `Success! Sent angle: ${angleValue}`;
            statusDiv.style.color = "green";
        })
        .catch(error => {
            console.error("Fetch error:", error);
            statusDiv.textContent = "Failed to send request. Check console or device connection.";
            statusDiv.style.color = "red";
        });
      });
    </script>
  </body>
</html>
